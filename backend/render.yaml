services:
  - type: web
    name: emotion-ai-buddy-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: HUGGINGFACE_API_KEY
        value: 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
      - key: DATABASE_URL
        fromDatabase:
          name: emotion-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: emotion-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: emotion-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
    healthCheckPath: /auth/health

databases:
  - name: emotion-db
    databaseName: emotion_ai_db
    user: emotion_user
    plan: free
