services:
  - type: web
    name: emotion-ai-buddy-backend
    env: java
    plan: free
    buildCommand: "./gradlew build -x test"
    startCommand: "java -jar build/libs/backend-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx512m"
      - key: DATABASE_URL
        fromDatabase:
          name: backend-db
          property: connectionString
    healthCheckPath: /health

databases:
  - name: backend-db
    databaseName: emotion_ai_backend
    user: emotion_ai_user
